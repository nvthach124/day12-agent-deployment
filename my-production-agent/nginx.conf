events {
    worker_connections 1024;
}

http {
    upstream agent_servers {
        # Docker DNS sẽ tự động phân giải "agent" thành IP của các container agent đang chạy
        server agent:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://agent_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout cấu hình cho AI (vì LLM có thể phản hồi chậm)
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
        }

        # Health check riêng cho Load Balancer
        location /lb-status {
            return 200 '{"status":"active","load_balancer":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
